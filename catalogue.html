<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caisse Noire — Catalogue &amp; équilibrage (v0.6)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4efe4; --bg2:#efe8d8; --surface:#ffffff; --surface2:#faf6ec;
  --ink:#33302a; --muted:#8c8678; --line:#e9e2d3; --line2:#ddd4c1;
  --gold:#e3a72b; --gold-d:#c98f18; --money:#33a36b; --red:#e0654f; --blue:#4a86d6; --purple:#9b6cc4;
  --justice:#4a86d6; --presse:#e08a3c; --finances:#33a36b;
  --shadow:0 6px 20px rgba(80,60,20,.10); --shadow-sm:0 3px 10px rgba(80,60,20,.08);
}
*{box-sizing:border-box}
body{margin:0;color:var(--ink);font:15px/1.55 "Nunito",system-ui,sans-serif;background:radial-gradient(120% 100% at 50% 0%,#fbf7ee 0%,var(--bg) 55%,var(--bg2) 100%);min-height:100vh}
h1,h2,h3{font-family:"Fredoka",sans-serif;margin:0;font-weight:600}
header{padding:22px;text-align:center}
header h1{font-size:32px}
header p{color:var(--muted);max-width:820px;margin:8px auto 0;font-size:13.5px}
header a{color:var(--gold-d);font-weight:800}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 40px}
.filterbar{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:6px 0 18px;position:sticky;top:0;background:linear-gradient(180deg,#f8f2e6,#f8f2e6 70%,transparent);padding:12px 0;z-index:5}
.chip{padding:7px 14px;border:1.5px solid var(--line2);border-radius:999px;cursor:pointer;font-size:13px;color:var(--muted);font-weight:700;background:var(--surface)}
.chip.active{background:linear-gradient(180deg,#f0b53d,var(--gold));color:#3a2a06;border-color:var(--gold-d)}
.sec-title{margin:26px 0 2px;font-size:22px}
.sec-sub{color:var(--muted);font-size:13px;margin:0 0 14px;max-width:900px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:12px}
.card{background:var(--surface);border:1.5px solid var(--line);border-radius:14px;padding:12px;display:flex;flex-direction:column;box-shadow:var(--shadow-sm);min-height:112px;border-top:4px solid var(--line2)}
.card .nom{font-weight:800;font-size:14px;line-height:1.15;font-family:"Fredoka"}
.card .desc{font-size:11.5px;color:var(--muted);margin-top:7px;line-height:1.4;flex:1;font-weight:600}
.card .foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:12px}
.tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:800;border:1.5px solid var(--line2);color:var(--muted);background:var(--surface2);margin-top:5px;align-self:flex-start}
.t-justice{color:var(--justice);border-color:#c5d8f4;background:#eef4fc}.t-presse{color:var(--presse);border-color:#f3ddc2;background:#fdf3e6}.t-finances{color:var(--finances);border-color:#bfe5d1;background:#e9f7f0}
.cout{color:var(--gold-d);font-weight:800}.voix{color:var(--money);font-weight:800}.malus{color:var(--red);font-weight:800}
.fam{font-size:10.5px;color:var(--gold-d);font-weight:800;margin-top:2px}
.card.votant{border-top-color:var(--money)}.card.sale{border-top-color:var(--red)}.card.propre{border-top-color:var(--money)}
.card.att{border-top-color:var(--purple)}.card.def{border-top-color:var(--blue)}.card.coup{border-top-color:var(--gold)}.card.role{border-top-color:var(--gold)}
.panel{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);margin-top:8px}
.btn{background:linear-gradient(180deg,#f0b53d,var(--gold));color:#3a2a06;border:1.5px solid var(--gold-d);padding:10px 18px;border-radius:999px;cursor:pointer;font-weight:800;font-size:14px}
select{background:var(--surface);border:1.5px solid var(--line2);border-radius:10px;padding:7px 10px;font:inherit}
table.bal{border-collapse:collapse;width:100%;font-size:13.5px;margin-top:12px}
table.bal th,table.bal td{border:1px solid var(--line);padding:8px 10px;text-align:left}
table.bal th{background:var(--surface2);color:var(--gold-d);font-family:Fredoka}
.kpi{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:8px}
.kpi div b{display:block;font-size:24px;color:var(--gold-d);font-family:Fredoka}
.kpi div span{font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>🗳️ Caisse Noire — Catalogue <span style="color:var(--muted);font-size:15px">(v0.6 « corruption cachée »)</span></h1>
  <p>Référence en lecture seule, générée depuis le moteur <code>src/engine.js</code>. Corruption <b>cachée</b> · dénonciation = <b>pari qui frappe l'argent</b> · voix lues sur les votants · rôles secrets. Seuil de victoire = <b>30</b> (2→6 joueurs). · <a href="index.html">▶ Jouer</a></p>
</header>
<div class="wrap">
  <div class="filterbar" id="filter"></div>
  <div id="body"></div>
</div>

<script src="src/engine.js"></script>
<script>
const CN = window.CaisseNoire;
const $ = s => document.querySelector(s);
const frontClass = {Justice:"t-justice",Presse:"t-presse",Finances:"t-finances"};
const TIER = {Petit:"Petit",Moyen:"Moyen",Gros:"Gros"};

const SECTIONS = ["Tout","Votants","Corruption","Propre","Attaques","Défenses","Coups","Rôles & Objectifs","Équilibrage"];
let cur = "Tout";
function chips(){ const f=$("#filter"); f.innerHTML=""; SECTIONS.forEach(s=>{ const c=document.createElement("div"); c.className="chip"+(s===cur?" active":""); c.textContent=s; c.onclick=()=>{cur=s;chips();render();}; f.appendChild(c); }); }
function sec(t,sub,h){ return `<h2 class="sec-title">${t}</h2><p class="sec-sub">${sub}</p><div class="grid">${h}</div>`; }
const show = s => cur==="Tout"||cur===s;
const combines = k => CN.COMBINES_DEF.filter(c=>c.kind===k);

function votCard(v){ const fam=CN.FAMILIES[v.bloc]||"indépendant";
  return `<div class="card votant"><div class="nom">${v.nom}</div><div class="fam">👥 ${fam}</div>
    <div class="tag">${TIER[v.tier]||v.tier} · ${v.bloc}</div>
    <div class="foot"><span class="cout">${v.cost} M€</span><span class="voix">${v.voix} voix</span></div></div>`; }

function render(){
  let h="";
  if(show("Votants")){
    let g=""; const byFam={};
    CN.VOTANTS.forEach(v=>{ const f=CN.FAMILIES[v.bloc]||"Indépendants (sans synergie)"; (byFam[f]=byFam[f]||[]).push(v); });
    Object.keys(CN.FAMILY_DEF).concat(["Indépendants (sans synergie)"]).forEach(f=>{ (byFam[f]||[]).forEach(v=>g+=votCard(v)); });
    const pool=CN.VOTANTS.reduce((a,v)=>a+v.voix,0);
    h+=sec(`Votants — ${CN.VOTANTS.length} blocs uniques (${pool} voix)`,
      "Réunir <b>3 blocs d'une même famille</b> = coalition complète → <b>+3 voix</b> (puis +1/bloc). Une coalition complète est <b>fidèle → involable</b> (protégée du vol). Incompat. DURES : Intégristes✗LGBT · Patronat✗CGT (+ molles −1 voix).", g);
  }
  if(show("Corruption")){
    let g=""; ["Justice","Presse","Finances"].forEach(fr=>{ combines("cor").filter(c=>c.front===fr).sort((a,b)=>a.gain-b.gain).forEach(c=>{
      g+=`<div class="card sale"><div class="nom">${c.nom}</div><span class="tag ${frontClass[fr]}">SALE · ${fr}</span>
        <div class="desc">Tu encaisses <b>+${c.gain} M€</b> (face cachée). Si on te dénonce sur ${fr} : tu <b>recraches ${c.gain} M€</b>.</div>
        <div class="foot"><span class="voix">+${c.gain} M€</span><span class="malus">−${c.gain} si dénoncé</span></div></div>`; }); });
    h+=sec("Corruption (SALE) — 3 fronts × 3/6/9",
      "Jouée <b>face cachée</b> sur son front. Mêmes montants (3/6/9) sur chaque front → impossible de déduire le montant depuis le front. Montant gagné = montant perdu si dénoncé.", g);
  }
  if(show("Propre")){
    let g=""; combines("clean").sort((a,b)=>a.gain-b.gain).forEach(c=>{
      g+=`<div class="card propre"><div class="nom">${c.nom}</div><span class="tag t-finances">PROPRE · sûr</span>
        <div class="desc">+${c.gain} M€, <b>jamais dénonçable</b>. Posée face cachée sur un front <b>au choix</b> = leurre pour brouiller tes piles.</div>
        <div class="foot"><span class="voix">+${c.gain} M€</span><span style="color:var(--money);font-weight:800">aucun risque</span></div></div>`; });
    h+=sec("Financement PROPRE — leurres (3 / 6)","Argent légal et sûr (plafonne à +6 ; le +9 est réservé au sale = prime du risque). Sert de leurre : face cachée, on ne distingue pas un don d'un pot-de-vin. Ratio ~2 sales pour 1 propre.", g);
  }
  if(show("Attaques")){
    const deb=combines("steal").find(c=>c.e==="debauchage"), opa=combines("steal").find(c=>c.e==="opa");
    const g=`
      <div class="card att"><div class="nom">Dénonciation</div><span class="tag">Attaque · 2 M€</span><div class="desc"><b>PARI</b> : un rival + UN front. Touché → il perd le total sale du front (cash, sinon rend des votants → perd des voix, retour marché). Raté → tu perds ta mise + <b>3 M€ d'amende</b> à la cible.</div></div>
      <div class="card att"><div class="nom">Débauchage ×${deb.n}</div><span class="tag">Attaque · 2 M€</span><div class="desc">Vol : cible un bloc <b>ISOLÉ</b> d'un rival → −2 voix pour lui, +2 pour toi.</div></div>
      <div class="card att"><div class="nom">OPA électorale ×${opa.n}</div><span class="tag">Attaque · 4 M€</span><div class="desc">Vol fort : −3 voix pour la cible, +3 pour toi, sur un bloc isolé.</div></div>`;
    h+=sec("Attaques","La dénonciation frappe l'ARGENT (un pari). Le vol transfère des VOIX. On ne subit qu'UNE attaque (dénonciation ou vol) par manche.", g);
  }
  if(show("Défenses")){
    let g=""; combines("pro").forEach(c=>g+=`<div class="card def"><div class="nom">${c.nom}</div><span class="tag ${frontClass[c.front]}">Protection · 5 M€</span><div class="desc">Bouclier permanent sur ${c.front} — toute dénonciation y rate.</div></div>`);
    g+=`<div class="card def"><div class="nom">Blanchiment</div><span class="tag">Défense · 3 M€</span><div class="desc">Rend une de tes cartes sales <b>propre</b> (elle n'est plus dénonçable).</div></div>`;
    g+=`<div class="card def"><div class="nom">Élément de langage</div><span class="tag" style="color:var(--blue);border-color:#c5d8f4;background:#eef4fc">Réaction</span><div class="desc">Joue-la quand on te dénonce pour <b>annuler</b> le scandale. « C'est plus compliqué que ça. »</div></div>`;
    h+=sec("Défenses (3 fronts → 3 protections)","Protéger un front, blanchir une carte sale, ou annuler une dénonciation en réaction.", g);
  }
  if(show("Coups")){
    const d={remise:"Ton prochain votant coûte 3 M€ de moins.",incoherence:"Prends un bloc incompatible sans perte de voix, mais +1 carte sale sur Presse.",promesse:"+3 voix tout de suite, mais +1 carte sale sur Presse.",renvoi:"+3 M€ et pioche 1 carte."};
    let g=""; combines("coup").filter(c=>c.e!=="element").forEach(c=>g+=`<div class="card coup"><div class="nom">${c.nom} ×${c.n}</div><span class="tag">Coup tactique</span><div class="desc">${d[c.e]||""}</div></div>`);
    h+=sec("Coups tactiques","Petits effets pour pimenter.", g);
  }
  if(show("Rôles & Objectifs")){
    const bonus={meute:"1ʳᵉ protection Presse gratuite. (Fragile en Justice.)",lumiere:"Intégristes +1 voix. Interdit : Communauté LGBT.",cartel:"+1 M€ de revenu/tour. Interdit : CGT.",vague:"Dénonciation à moitié prix (1 M€).",verts:"Animalistes & Bobos −2 M€. Interdit : Lobby pétrolier.",forteresse:"« Costards » +2 M€ (Presse). Interdit : Diaspora."};
    let g=""; CN.PARTIES.forEach(p=>g+=`<div class="card role"><div class="nom">${p.nom}</div><span class="tag">Rôle · ${p.sub}</span><div class="desc">${bonus[p.id]||""}</div></div>`);
    let o=""; CN.OBJECTIVES.forEach(ob=>o+=`<div class="card role"><div class="nom">${ob.nom}</div><span class="tag" style="color:var(--purple);border-color:#dcc9ee;background:#f5eefc">Objectif secret</span><div class="desc">${ob.desc} → <b>+3 voix</b> si accompli (révélé à la fin).</div></div>`);
    h+=sec("Rôles secrets = pouvoir + objectif","Chaque joueur reçoit 1 rôle FACE CACHÉE : un pouvoir (parti) + un objectif secret. Tirés au hasard, cachés jusqu'à la fin.", g)+sec("Objectifs secrets","", o);
  }
  if(show("Équilibrage")){
    h+=`<h2 class="sec-title">📊 Bac à sable d'équilibrage</h2><p class="sec-sub">Des milliers de parties simulées avec le vrai moteur v0.6 (corruption cachée, dénonciation-pari, coalitions, rôles secrets). Seuil <b>30</b> (plat).</p>
      <div class="panel">
        <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
          <label>Parties / config <select id="mcGames"><option>300</option><option selected>800</option><option>1500</option></select></label>
          <button class="btn" onclick="runMC()">Simuler 2→6 joueurs</button>
          <span id="mcStatus" class="muted"></span>
        </div>
        <div id="mcResult" class="muted" style="margin-top:12px">Clique sur « Simuler ».</div>
      </div>`;
  }
  $("#body").innerHTML=h;
}
function runMC(){
  const games=+$("#mcGames").value; $("#mcStatus").textContent="Calcul en cours…";
  setTimeout(()=>{
    let rows="";
    for(const N of [2,3,4,5,6]){ const r=CN.simulate(N,games,4242+N); rows+=`<tr><td><b>${N} joueurs</b></td><td>${r.seuil}</td><td>${r.avgTurns} manches</td><td>${r.pctSeuil} %</td><td>${r.avgDenonc}</td><td>${r.seatSpread} pts</td></tr>`; }
    $("#mcResult").innerHTML=`<div class="kpi"><div><b>30</b><span>seuil (plat)</span></div><div><b>~11</b><span>manches moy.</span></div><div><b>≥98%</b><span>par le seuil</span></div></div>
      <table class="bal"><tr><th>Config</th><th>Seuil</th><th>Durée moy.</th><th>% par le seuil</th><th>Dénonc./partie</th><th>Écart sièges*</th></tr>${rows}</table>
      <p class="sec-sub" style="margin-top:10px">*Écart entre le siège qui gagne le plus et le moins. ${games} parties/config. Seuil plat 30 calibré (les bonus de coalition compensent le partage de l'électorat).</p>`;
    $("#mcStatus").textContent="Terminé ✓";
  },30);
}
chips(); render();
</script>
</body>
</html>
